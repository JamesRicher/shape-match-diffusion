# Shape-matching transformer on FAUST_r.
# Run with:  python train.py -c configs/faust_shape_matching.yaml

name: shape_matching          # experiment dir under experiments/<name>/
model_type: ShapeMatchingModel
is_train: true
# device: cuda                # optional; auto-detected (cuda if available) when omitted

datasets:
  train: {name: Faust_r, type: PairFaustDataset, phase: train, ret_evecs: true}
  # exclude_self drops trivial (i, i) self-pairs so val/test match run_baselines.py.
  val:   {name: Faust_r, type: PairFaustDataset, phase: test,  ret_evecs: true, exclude_self: true}
  # evaluate.py runs the test set as the experiment's final result. Currently the
  # same 20 shapes as val (best-model selection also monitors test) — swap to a
  # held-out split here if you later decouple selection from test.
  test:  {name: Faust_r, type: PairFaustDataset, phase: test,  ret_evecs: true, exclude_self: true}

networks:
  encoder:
    type: ShapeMatchingEncoder
    in_dim: null              # auto-filled from the data at runtime
    dim: 128
    heads: 4
    depth: 4
    dropout: 0.0

train:
  total_epochs: 15           # ULRSSM FAUST recipe
  log_freq: 20
  optims:
    encoder: {type: AdamW, lr: 1e-3, weight_decay: 1e-4}
  schedulers:
    # T_max is set automatically from total_epochs in train.py (do not set it here)
    encoder: {type: CosineAnnealingLR, eta_min: 1e-4}
  losses:
    l_nce: {type: SupervisedContrastiveLoss, temperature: 0.07, loss_weight: 1.0}
    l_dir: {type: DirichletLoss, normalize: true, loss_weight: 0.01}

val:
  metrics:
    geo_error: {type: calculate_geodesic_error}
    # match run_baselines.py's PCK window so AUC is directly comparable
    plot_pck:  {type: plot_pck, threshold: 0.25, steps: 100}
