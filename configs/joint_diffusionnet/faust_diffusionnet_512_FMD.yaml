# FAUST joint model: DiffusionNet extractor (warm-started from HKS pretrain) + FM densifier.
# WARM-START: net-only load fills `extractor` from the pretrained checkpoint, denoiser stays
# random, starts at epoch 0. `resume: false` required. If best.pth is missing the load is
# silently skipped and the extractor starts RANDOM -- pretrain first:
#   python pretrain_diffusionnet.py -c debug/feature_extractor/configs/faust_diffusionnet_hks.yaml --num_workers 8
#   python run_experiment.py -c configs/joint_diffusionnet/faust_diffusionnet_512_FMD.yaml --num_qual 0 --num_workers 8
# Extractor arch MUST match the pretrain config exactly (hks, hidden 128, n_block 4, k_eig 128).
# For a COLD-START ablation instead: drop the `path:` block and set both LRs to 1e-3.
name: faust_diffusionnet_512_FMD
model_type: MatrixDiffusionModel
is_train: true

path:
  resume_state: extractor_experiments/diffusion_net/faust_diffusionnet_hks/models/best.pth
  resume: false

datasets:
  train: {name: Faust_r, type: SparsePairFaustDataset, phase: train, n_sparse: 512, fps_metric: euclidean, ret_evecs: true, num_evecs: 128}
  val:   {name: Faust_r, type: SparsePairFaustDataset, phase: test,  n_sparse: 512, exclude_self: true, fps_metric: euclidean, ret_evecs: true, num_evecs: 128}
  test:  {name: Faust_r, type: SparsePairFaustDataset, phase: test,  n_sparse: 512, exclude_self: true, ret_evecs: true, num_evecs: 200, fps_metric: euclidean}

networks:
  extractor:
    type: DiffusionNetExtractor
    out_dim: 128
    input_type: hks
    hidden: 128
    n_block: 4
    k_eig: 128
    hks_count: 16
  denoiser:
    type: MatrixDenoiser
    feat_dim: 128
    dim: 128
    heads: 4
    depth: 6
    n_anchors: 16
    dropout: 0.0

diffusion:
  eta: 0.1
  proj_iters: 6
  schedule_s: 0.008
  sample_steps: 50
  final_iters: 20

densifier:
  type: FunctionalMapDensifier
  feat_source: diffnet   # dense global data term from the trained DiffusionNet extractor (falls back to WKS if absent)
  k_fm: 120
  n_e: 100
  lm_bands: 20
  lm_weight: 5.0
  mu: 0.1
  variance: 7.0

eval:
  sparse: true
  dense: false

train:
  total_epochs: 30
  log_freq: 20
  optims:
    # warm-started extractor: gentle fine-tune (10x lower LR); denoiser trains from scratch
    extractor: {type: AdamW, lr: 1e-4, weight_decay: 1e-4}
    denoiser:  {type: AdamW, lr: 1e-3, weight_decay: 1e-4}
  schedulers:
    extractor: {type: CosineAnnealingLR, eta_min: 1e-5}
    denoiser:  {type: CosineAnnealingLR, eta_min: 1e-4}

val:
  subset: 40
