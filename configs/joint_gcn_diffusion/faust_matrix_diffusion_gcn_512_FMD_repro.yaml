# REPRODUCTION of the good run (faust_matrix_diffusion_gcn_512_FMD, dense_error 0.016) under
# CURRENT code, to test whether the degradation is an unexpected repo change rather than config
# drift. Verbatim copy of the good config with two deliberate changes:
#   * new name (does not clobber the original good run's experiment dir)
#   * fps_metric: euclidean PINNED on train/val/test -- the good run trained under euclidean
#     when that was the default; the default has since drifted to geodesic (commit ce263b7), so
#     we pin it to hold the FPS regime constant and isolate any OTHER code change.
# Same feature extractor (extractor_faust.pth, patch-64) as the good run.
#
# Read the result with the sparse-flip diagnostic (the low-variance signal), not dense_error:
#   python evaluate.py -c configs/joint_gcn_diffusion/faust_matrix_diffusion_gcn_512_FMD_repro.yaml --num_qual 0
#   python -m diagnostics.sparse_independent_error -c configs/joint_gcn_diffusion/faust_matrix_diffusion_gcn_512_FMD_repro.yaml --fps-metric euclidean
# Expected if no code drift: dense ~0.016, raw sparse flip ~7%. Worse => unexpected repo change.
name: faust_matrix_diffusion_gcn_512_FMD_repro
model_type: MatrixDiffusionModel
is_train: true

path:
  resume_state: extractor_faust.pth
  resume: false

datasets:
  train: {name: Faust_r, type: SparsePairFaustDataset, phase: train, n_sparse: 512, fps_metric: euclidean}
  val:   {name: Faust_r, type: SparsePairFaustDataset, phase: test,  n_sparse: 512, exclude_self: true, fps_metric: euclidean}
  test:  {name: Faust_r, type: SparsePairFaustDataset, phase: test,  n_sparse: 512, exclude_self: true, ret_evecs: true, num_evecs: 200, fps_metric: euclidean}

networks:
  extractor:
    type: GCNFeatureExtractor
    out_dim: 128
    node_in: xyz
    hidden: [16, 32, 64]
    hops: [1, 2, 3, 4]
    patch_size: 64
    knn: 8
  denoiser:
    type: MatrixDenoiser
    feat_dim: 128
    dim: 128
    heads: 4
    depth: 6
    n_anchors: 16
    dropout: 0.0

diffusion:
  eta: 0.1
  proj_iters: 6
  schedule_s: 0.008
  sample_steps: 50
  final_iters: 20

densifier:
  type: FunctionalMapDensifier
  k_fm: 120
  n_e: 100
  lm_bands: 20
  lm_weight: 5.0
  mu: 0.1
  variance: 7.0

eval:
  sparse: true
  dense: false

train:
  total_epochs: 30
  log_freq: 20
  optims:
    extractor: {type: AdamW, lr: 1e-4, weight_decay: 1e-4}
    denoiser:  {type: AdamW, lr: 1e-3, weight_decay: 1e-4}
  schedulers:
    extractor: {type: CosineAnnealingLR, eta_min: 1e-5}
    denoiser:  {type: CosineAnnealingLR, eta_min: 1e-4}

val:
  subset: 40
