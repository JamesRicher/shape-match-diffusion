# 2x2 ablation, Run A: patch-64 extractor + GEODESIC training FPS.
# Holds the GOOD extractor (extractor_faust.pth, patch_size 64) constant and flips only the
# training FPS metric to geodesic (repo default). Compare dense_error against the good FMD
# run (patch 64 + euclidean train = 0.016):
#   ~0.09  -> training FPS is the cause (extractor exonerated)
#   ~0.016 -> geodesic training is fine (extractor is the cause)
name: runA_patch64_geo
model_type: MatrixDiffusionModel
is_train: true

path:
  resume_state: extractor_faust.pth
  resume: false

datasets:
  # no fps_metric set -> repo default 'geodesic' for train/val/test
  train: {name: Faust_r, type: SparsePairFaustDataset, phase: train, n_sparse: 512}
  val:   {name: Faust_r, type: SparsePairFaustDataset, phase: test,  n_sparse: 512, exclude_self: true}
  test:  {name: Faust_r, type: SparsePairFaustDataset, phase: test,  n_sparse: 512, exclude_self: true, ret_evecs: true, num_evecs: 200}

networks:
  extractor:
    type: GCNFeatureExtractor
    out_dim: 128
    node_in: xyz
    hidden: [16, 32, 64]
    hops: [1, 2, 3, 4]
    patch_size: 64
    knn: 8
  denoiser:
    type: MatrixDenoiser
    feat_dim: 128
    dim: 128
    heads: 4
    depth: 6
    n_anchors: 16
    dropout: 0.0

diffusion:
  eta: 0.1
  proj_iters: 6
  schedule_s: 0.008
  sample_steps: 50
  final_iters: 20

densifier:
  type: FunctionalMapDensifier
  k_fm: 120
  n_e: 100
  lm_bands: 20
  lm_weight: 5.0
  mu: 0.1
  variance: 7.0

eval:
  sparse: true
  dense: false

train:
  total_epochs: 30
  log_freq: 20
  optims:
    extractor: {type: AdamW, lr: 1e-4, weight_decay: 1e-4}
    denoiser:  {type: AdamW, lr: 1e-3, weight_decay: 1e-4}
  schedulers:
    extractor: {type: CosineAnnealingLR, eta_min: 1e-5}
    denoiser:  {type: CosineAnnealingLR, eta_min: 1e-4}

val:
  subset: 40
