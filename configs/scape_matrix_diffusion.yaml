# Matrix diffusion matcher on SCAPE_r (logit-space DDPM over the assignment).
# SCAPE analogue of configs/faust_matrix_diffusion.yaml; only the dataset and the
# epoch count (iteration-matched to FAUST) differ.
# Run with:  python train.py -c configs/scape_matrix_diffusion.yaml
# Evaluate:  python evaluate.py -c configs/scape_matrix_diffusion.yaml --num_qual 0
#   (--num_qual 0 required: validate_single returns a SPARSE p2p; dense qualitative
#    texture-transfer needs densification, which is deferred — steps.md Step 3.)

name: scape_matrix_diffusion   # experiment dir under experiments/<name>/
model_type: MatrixDiffusionModel
is_train: true
# device: cuda                 # optional; auto-detected (cuda if available) when omitted

datasets:
  # Sparse FPS tokens with a bijective sparse GT permutation (n_sparse per shape).
  # SCAPE_r: 51 train shapes -> 2601 train pairs. If the n_sparse assert trips
  # (n_sparse <= template coverage T), the shared .vts template is smaller than 512.
  train: {name: Scape_r, type: SparsePairScapeDataset, phase: train, n_sparse: 512}
  val:   {name: Scape_r, type: SparsePairScapeDataset, phase: test,  n_sparse: 512, exclude_self: true}
  # test also loads eigenbases for the ZoomOut densifier (num_evecs >= densifier.k_final).
  # evecs stay OFF for train/val so training is untouched (only evaluate.py reads test).
  test:  {name: Scape_r, type: SparsePairScapeDataset, phase: test,  n_sparse: 512, exclude_self: true, ret_evecs: true, num_evecs: 200}

networks:
  denoiser:
    type: MatrixDenoiser
    feat_dim: null             # auto-filled from the data at runtime
    dim: 128
    heads: 4
    depth: 6
    n_anchors: 16
    dropout: 0.0

# forward/reverse diffusion knobs (read by MatrixDiffusionModel)
diffusion:
  eta: 0.1                     # logit_target label-smoothing
  proj_iters: 6                # Sinkhorn Π_S iterations (read-in + training projection)
  schedule_s: 0.008            # cosine ᾱ offset
  sample_steps: 50             # DDIM reverse steps at inference
  final_iters: 20              # Sinkhorn iters for the final DS snap

# ZoomOut spectral densifier: lifts the sparse p2p to a dense whole-shape map. A non-learned
# post-process used only for reporting-time dense MGE (evaluate.py); never in training.
densifier:
  type: ZoomOutDensifier
  k_start: 20
  k_step: 10
  k_final: 200                 # must be <= datasets.test.num_evecs

# which stats validation reports. Dense whole-shape MGE is OFF here so mid-training validation
# stays the fast sparse dev metric (and needs no evecs). evaluate.py forces dense-only itself
# (under independent-FPS honest sampling), so this only governs training-time validation.
eval:
  sparse: true
  dense: false

train:
  # Iteration-matched to the FAUST diffusion run: FAUST is 30 epochs x 6400 train pairs
  # (80 shapes) = 192k iters. SCAPE has 2601 train pairs (51 shapes), so 192k / 2601 ~=
  # 74 epochs gives the equivalent number of optimizer steps.
  total_epochs: 74
  log_freq: 20
  optims:
    denoiser: {type: AdamW, lr: 1e-3, weight_decay: 1e-4}
  schedulers:
    # T_max is set automatically from total_epochs in train.py (do not set it here)
    denoiser: {type: CosineAnnealingLR, eta_min: 1e-4}

# validation uses the model's own sparse dev metric (avg_error + acc over FPS points);
# no registry metrics needed (densification / dense geo_error deferred — steps.md Step 3).
val:
  # each val pair runs a full DDIM sampler, so cap mid-training validation to a fixed
  # subset (evenly spaced, deterministic). Full test eval (evaluate.py) uses all pairs.
  subset: 40
