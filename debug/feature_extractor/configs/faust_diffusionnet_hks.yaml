# DEBUG DiffusionNet pretraining config with INTRINSIC (HKS) input.
# Same as faust_diffusionnet.yaml but input_type: hks -- the cross-dataset-transferable,
# coordinate-frame-agnostic variant (symmetry-ambiguous). Unlike xyz on template-aligned
# FAUST_r, HKS matching starts near chance, so it is the meaningful overfit/sanity signal.
#   python debug/feature_extractor/sanity_extractor.py -c debug/feature_extractor/configs/faust_diffusionnet_hks.yaml
#   python pretrain_diffusionnet.py -c debug/feature_extractor/configs/faust_diffusionnet_hks.yaml

name: faust_diffusionnet_hks      # run dir = extractor_experiments/diffusion_net/<name>/
# device: cuda            # optional; auto-detected when omitted

datasets:
  # ret_evecs: true REQUIRED (num_evecs >= network.k_eig). HKS is intrinsic, so fps_metric
  # matters less, but keep euclidean to match the joint-model regime.
  train: {name: Faust_r, type: SparsePairFaustDataset, phase: train, n_sparse: 256, fps_metric: euclidean, ret_evecs: true, num_evecs: 128}
  val:   {name: Faust_r, type: SparsePairFaustDataset, phase: test,  n_sparse: 256, exclude_self: true, fps_metric: euclidean, ret_evecs: true, num_evecs: 128}

network:
  type: DiffusionNetExtractor
  out_dim: 128
  input_type: hks         # intrinsic HKS descriptors (transferable, symmetry-ambiguous)
  hidden: 128
  n_block: 4
  k_eig: 128              # <= datasets.*.num_evecs
  hks_count: 16           # number of HKS bands fed in

train:
  epochs: 25
  lr: 1.0e-3
  weight_decay: 1.0e-4
  tau: 0.07               # InfoNCE temperature
  num_workers: 4          # pin_memory off (collate ships sparse gradX/gradY)
  eval_limit: 40          # val pairs scored each epoch (null = all)
