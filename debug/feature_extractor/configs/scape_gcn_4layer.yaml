# DEBUG feature-extractor pretraining -- SCAPE_r. Replicates faust_gcn_4layer.yaml (the recipe
# that produced the good FAUST extractor) EXACTLY; only the dataset differs.
#   python pretrain_extractor.py -c debug/feature_extractor/configs/scape_gcn_4layer.yaml
#   python evaluate_extractor.py  -c debug/feature_extractor/configs/scape_gcn_4layer.yaml
#
# fps_metric is pinned to 'euclidean' -- the FAUST recipe left it unset and relied on the repo
# default, which has since changed to 'geodesic'; the good FAUST pipeline used euclidean, so we
# pin it here to reproduce that regime (and to be robust to future default drift). Change both
# dataset lines to fps_metric: geodesic if you want the intrinsic-sampling variant instead.

name: scape_gcn_4layer

datasets:
  train: {name: Scape_r, type: SparsePairScapeDataset, phase: train, n_sparse: 256, fps_metric: euclidean}
  val:   {name: Scape_r, type: SparsePairScapeDataset, phase: test,  n_sparse: 256, exclude_self: true, fps_metric: euclidean}

# the feature extractor to pretrain (same class the diffusion config registers as `extractor`)
network:
  type: GCNFeatureExtractor
  out_dim: 128
  node_in: xyz            # or 'anchor' for a fully-intrinsic (geodesic radial) extractor
  hidden: [16, 32, 64]    # widths in->16->32->64->out_dim (4 TAGConv layers)
  hops: [1, 2, 3, 4]      # per-layer hop counts K (len == len(hidden) + 1)
  patch_size: 64          # full-mesh vertices per local patch
  knn: 8                  # within-patch graph neighbours

# contrastive pretraining (symmetric InfoNCE over the bijective sparse GT)
train:
  epochs: 80             # ~80% of FAUST pretrain budget (~260k steps); 2601 pairs/epoch
  lr: 1.0e-3
  weight_decay: 1.0e-4
  tau: 0.07               # InfoNCE temperature
  num_workers: 8          # DataLoader workers that prefetch + patchify off the main thread
  eval_limit: 40          # val pairs scored each epoch (null = all)
